    <script>
        // আপনার দেওয়া মূল অফার লিংক

        // ফোনের ক্রোম ব্রাউজারে লিংক ওপেন করার স্পেশাল ইন্টেন্ট ট্রিকস
        function forceOpenInChrome(url) {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isAndroid = /Android/i.test(ua);
            
            if (isAndroid) {
                // অ্যান্ড্রয়েড ডিভাইসের জন্য সরাসরি গুগল ক্রোম অ্যাপে পুশ করার কমান্ড
                const chromeIntent = "intent://" + url.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
                window.location.href = chromeIntent;
            } else {
                // iOS বা অন্যান্য ডিভাইসের ক্ষেত্রে নরমাল উইন্ডো রিডাইরেকশন
                window.location.href = url;
            }
        }

        // হ্যাপটিক ভাইব্রেশন ফাংশন (বাস্তব ক্লিকের অনুভূতির জন্য)
        function triggerVibration() {
            if (navigator.vibrate) {
                navigator.vibrate(15);
            }
        }

        // ১. ফেসবুক ব্রাউজার বাটন ক্লিক ইভেন্ট Handler
        const fbBtn = document.getElementById('fbBrowserBtn');
        fbBtn.addEventListener('click', function() {
            triggerVibration();
            // এটি সাধারণ নিয়মে লিংক খুলবে (ফেসবুকের ভেতরে থাকলে ফেসবুক ব্রাউজারেই খুলবে)
            window.location.href = offerUrl;
        });

        // ২. ক্রোম ব্রাউজার বাটন ক্লিক ইভেন্ট Handler
        const chromeBtn = document.getElementById('chromeBrowserBtn');
        chromeBtn.addEventListener('click', function() {
            triggerVibration();
            // এটি ফেসবুক ব্রাউজার ব্লক করে সরাসরি ক্রোম ব্রাউজার ওপেন করবে
            forceOpenInChrome(offerUrl);
        });
    </script>
